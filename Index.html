<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnailMail Pen Pals</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="wrap">

<header class="topbar">
<div>
<div class="brand">SnailMail Pen Pals</div>
<div class="subbrand">Find pen pals by interests and state</div>
</div>
</header>

<section class="hero card">
<div class="postmark">
<div class="ring1"></div>
<div class="ring2"></div>
<div class="text">POSTMARKED<br>FRIENDSHIP</div>
</div>

<h1>Find people who love real mail.</h1>
<p>Create a profile and search by interests or state.</p>
</section>

<section class="layout">

<div class="card panel">
<h2>Your Profile</h2>

<input id="name" placeholder="Name">
<input id="state" placeholder="State">
<input id="interests" placeholder="Interests (comma separated)">
<input id="dislikes" placeholder="Dislikes">

<button onclick="saveProfile()">Save</button>
</div>

<div class="card panel">
<h2>Search</h2>

<input id="searchInterest" placeholder="Search interest">
<input id="searchState" placeholder="Search state">
<button onclick="search()">Search</button>

<div id="results"></div>
</div>

</section>
</div>

<script src="app.js"></script>
</body>
</html>
