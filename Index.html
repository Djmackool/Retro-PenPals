<script src="supabase-config.js"
  <link rel="stylesheet" href="styles.css">
  <header class="topbar">
    <div>
      <div class="brand">SnailMail Pen Pals</div>
      <div class="subbrand">Find pen pals by interests and state</div>
    </div>
    <button class="secondary" id="resetBtn">Reset</button>
  </header>

  <section class="hero card">
    <div class="postmark" aria-hidden="true">
      <div class="ring1"></div>
      <div class="ring2"></div>
      <div class="text">POSTMARKED<br>FRIENDSHIP</div>
      <div class="lines"><span></span><span></span><span></span></div>
    </div>

    <div class="hero-inner">
      <h1>Find people who love real mail.</h1>
      <p class="lead">
        Create a snail mail profile with your interests, dislikes, letter-writing style, and state.
        Search pen pals by common interests or location.
      </p>

      <div class="chips">
        <span class="chip">Interests + dislikes</span>
        <span class="chip">Search by state</span>
        <span class="chip">Search by common hobbies</span>
        <span class="chip">Privacy-first mail flow</span>
      </div>
    </div>
  </section>

  <section class="layout">
    <aside class="card panel">
      <div class="mini">Your profile</div>
      <h2>Letter-writing profile</h2>

      <label for="name">Display name</label>
      <input id="name" placeholder="Amanda" />

      <label for="state">State</label>
      <input id="state" placeholder="Georgia" />

      <label for="city">City or general area</label>
      <input id="city" placeholder="McDonough area" />

      <label for="mailType">Mail style</label>
      <select id="mailType">
        <option value="">Choose one</option>
        <option>Long handwritten letters</option>
        <option>Short notes & postcards</option>
        <option>Mix of both</option>
      </select>

      <label for="frequency">Write frequency</label>
      <select id="frequency">
        <option value="">Choose one</option>
        <option>Weekly</option>
        <option>Twice a month</option>
        <option>Monthly</option>
        <option>Flexible / slower pace</option>
      </select>

      <label for="interests">Interests</label>
      <input id="interests" placeholder="tattoos, horror movies, journaling, spooky stationery" />

      <label for="dislikes">Dislikes / do not want to write about</label>
      <input id="dislikes" placeholder="sports, politics, rude humor" />

      <label for="bio">About you</label>
      <textarea id="bio" placeholder="I like meaningful letters, moody stationery, and genuine conversation."></textarea>

      <div class="button-row">
        <button id="saveBtn">Save profile</button>
        <button class="secondary" id="sampleBtn">Load sample</button>
      </div>

      <div class="footnote">Demo only. Your profile saves in your browser on this device.</div>
    </aside>

    <main class="card panel">
      <div class="mini">Search pen pals</div>
      <h2>Find by state or common interests</h2>

      <div class="searchbar">
        <input id="interestSearch" placeholder="Search interest, like horror movies or journaling" />
        <input id="stateSearch" placeholder="Search state, like Georgia" />
        <button id="searchBtn">Search</button>
      </div>

      <div id="results" class="results"></div>
    </main>
  </section>
</div>
