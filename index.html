<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Pen Pals</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>

<div class="wrap">

<header class="topbar">
  <div>
    <div class="brand">Retro Pen Pals</div>
    <div class="subbrand">Find snail mail pen pals around the world</div>
  </div>

  <div class="button-row" style="margin:0">
    <button class="secondary" id="signupBtnTop">Sign up</button>
    <button class="secondary" id="loginBtnTop">Log in</button>
  </div>
</header>

<section class="hero card">
  <div class="hero-inner">
    <h1>Find people who love real mail.</h1>

    <p class="lead">
      Create a snail mail profile with your interests, dislikes, letter-writing style, and state.
      Search pen pals by common interests or location.
    </p>
  </div>
</section>

<section class="layout">

<aside class="card panel">

  <div class="mini">Create profile</div>
  <h2>Letter-writing profile</h2>

  <label>Email</label>
  <input id="email" type="email" placeholder="you@email.com">

  <label>Password</label>
  <input id="password" type="password" placeholder="password">

  <label>Display name</label>
  <input id="name">

  <label>State</label>
  <input id="state">

  <label>City</label>
  <input id="city">

  <label>Interests</label>
  <input id="interests">

  <label>Dislikes</label>
  <input id="dislikes">

  <label>About you</label>
  <textarea id="bio"></textarea>

  <div class="button-row">
    <button id="saveBtn">Save Profile</button>
    <button class="secondary" id="signupBtn">Sign up</button>
    <button class="secondary" id="loginBtn">Log in</button>
  </div>

  <div id="status" class="footnote"></div>

</aside>

<main class="card panel">

  <div class="mini">Search</div>
  <h2>Find pen pals</h2>

  <input id="interestSearch" placeholder="Search interest">
  <input id="stateSearch" placeholder="Search state">

  <button id="searchBtn">Search</button>

  <div id="results"></div>

</main>

</section>
</div>

<script src="app.js"></script>
</body>
</html>
